# MemOS sidecar — runs as separate process, observed by RANKIGI.
#
# Bring up:
#   docker compose -f memos/docker-compose.yml up -d
#
# Tear down:
#   docker compose -f memos/docker-compose.yml down
#
# Endpoints:
#   MemOS API → http://localhost:8000
#   Qdrant    → http://localhost:6333
#   Neo4j     → http://localhost:7474 (browser) / bolt://localhost:7687

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: memos-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5.20-community
    container_name: memos-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/memospassword
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

  memos:
    image: memtensor/memos:latest
    container_name: memos-api
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=memospassword
      - MEMOS_API_KEY=${MEMOS_API_KEY:-localdev_memos_key}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      - qdrant
      - neo4j
    restart: unless-stopped

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
